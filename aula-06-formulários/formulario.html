<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Cadastro Aluno - DSM</h1>
    <p>Aqui você verá as informações do aluno</p>
    <!-- Título -->
    <form action="#" method="post">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="name">Nome Completo</label>
        <input type="text" id="name" required /><br /><br />
        <label for="email">E-mail</label>
        <input type="email" id="email" /><br /><br />
        <label for="nascimento">Data de Nascimento</label>
        <input type="date" id="nascimento" /><br /><br />
      </fieldset>
      <br />
      <!-- Preenchimento dos dados pessoais -->
      <fieldset>
        <legend>Dados Acadêmicos</legend>
        <label for="select">Periodo</label>
        <select id="select">
          <option value="dsm">DSM</option>
          <option value="ads">ADS</option>
          <option value="outro">OUTRO</option></select
        ><br /><br />
        <!-- Seleção do Curso -->
        <label for="periodo">Curso:</label>
        <input type="radio" name="periodo" id="manha" />Manhã
        <input type="radio" name="periodo" id="noite" />Noite <br /><br />
        <!-- Escolha dos periodos -->
        <label for="escreva">Observações:</label><br />
        <textarea id="escreva"></textarea><br />
        <!-- Botões do site -->
        <input type="submit" />
        <input type="reset" />
      </fieldset>
    </form>
  </body>
</html>
