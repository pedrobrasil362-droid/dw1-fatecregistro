<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras Mídias no HTML 5</title>
</head>
<body>
    <h1> Outras mídias no HTML5</h1>
    <header>
        <section>
            <h2>Áudio</h2>
            <audio controls src="audio.mp3"></audio>

            <h2>Vídeo</h2>
            <video controls src="video.mp4" type="video/mp4" width="400px"> Vídeo não encontrado ou não suportado </video>

            <h2>Vídeo do Youtube (externo) - iFrame</h2>
            <iframe width="620" height="400" src="https://www.youtube.com/embed/q-iDXiNIug8?si=2sOMKfjmc_bQcGhb" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></iframe>
        </section>
    </header>
</body>
</html>
