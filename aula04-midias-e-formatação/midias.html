<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividade</title>
  </head>
  <body>
    <header>
      <section>
        <h1>Aprenda a beber água</h1>
        <p>
          <strong>
            Beber água é muito importante, pois sua negligência pode levar você
            a ter <em>sérios problemas</em>, como por exemplo
            <mark>pedra nos ríns.</mark>
          </strong>
        </p>
        <figure>
          <img
            src="água.jpg"
            width="300px"
            height="300px"
            alt="Imagem de um copo de água"
          />
          <figcaption><strong>Foto de um copo de água</strong></figcaption>
        </figure>
      </section>

      <br />

      <h2>Áudio</h2>
      <audio controls>
        <source src="audio.mp3" type="audio/mpeg" />
        Audio não suportado
      </audio>

      <br /><br /><br />

      <video controls width="400px">
        <source src="bebendo água vídeo.mp4" type="video/mp4" />
        Vídeo não surpotado.
      </video>

      <br /><br /><br />

      <h2>Vídeo do tutorial de como beber água</h2>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/bCkCWnmAD-o?si=VujE4V6wQJW8tdnK"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>

      <br /><br /><br />

      <h2>Vetor SVG</h2>
      <svg width="200px" heidth="200px" aria-label="Ícone da Empresa">
        <title>Empresa de Água</title>
        <circle cx="50" cy="50" r="50"></circle>
      </svg>
    </header>
  </body>
</html>
